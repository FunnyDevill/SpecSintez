services:
  app:
    build: .
    container_name: specsintez-app
    restart: always
    ports:
      - "5500:5500"
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=specsintez
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - SESSION_SECRET=${SESSION_SECRET}
      - SMTP_HOST=smtp.mail.ru
      - SMTP_PORT=465
      - SMTP_SECURE=true
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASS=${ADMIN_PASS}
    volumes:
      - .:/app
      - /app/node_modules
      - uploads:/app/public/uploads
    command: npx nodemon server.js
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - specsintez-network

  postgres:
    image: postgres:15-alpine
    container_name: specsintez-db
    restart: always
    environment:
      - POSTGRES_DB=specsintez
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - specsintez-network

volumes:
  postgres-data:
  uploads:

networks:
  specsintez-network:
    driver: bridge