services:
  app:
    build: .
    container_name: specsintez-app
    restart: always
    ports:
      - "5500:5500"
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=specsintez
      - DB_USER=postgres
      - DB_PASSWORD=your_secure_password
      - SESSION_SECRET=your_random_secret
      - SMTP_HOST=smtp.mail.ru
      - SMTP_PORT=465
      - SMTP_SECURE=true
      - SMTP_USER=artem-korytov@mail.ru
      - SMTP_PASS=your_app_password
      - ADMIN_USER=admin
      - ADMIN_PASS=your_bcrypt_hash
    volumes:
      - .:/app
      - /app/node_modules
      - uploads:/app/public/uploads
    command: npx nodemon server.js
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - specsintez-network

  postgres:
    image: postgres:15-alpine
    container_name: specsintez-db
    restart: always
    environment:
      - POSTGRES_DB=specsintez
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=your_secure_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - specsintez-network

volumes:
  postgres-data:
  uploads:

networks:
  specsintez-network:
    driver: bridge